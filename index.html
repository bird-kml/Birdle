<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Birdle - Guess the Bird by Categories</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
       <header>
           <h1>BIRDLE</h1>
           <p class="subtitle">Guess the bird by its characteristics!</p>
           <div class="mode-toggle">
               <button id="mode-btn" onclick="toggleMode()">Go to Practice Mode</button>
           </div>
       </header>
       <div class="game-info">
           <div class="info-item">
               <span class="label">Guesses:</span>
               <span id="guess-count" class="value">0/6</span>
           </div>
           <div class="info-item">
               <span class="label">Birds in database:</span>
               <span id="bird-count" class="value">0</span>
           </div>
       </div>
       <div id="game-board" class="game-board">
           <div class="category-headers">
               <div class="category-header">Bird</div>
               <div class="category-header">Type</div>
               <div class="category-header">Color</div>
               <div class="category-header">Size</div>
               <div class="category-header">Habitat</div>
               <div class="category-header">Diet</div>
           </div>
       </div>
       <div class="input-section">
           <div class="autocomplete-wrapper">
               <input type="text" id="guess-input" placeholder="Start typing a bird name..." autocomplete="off">
               <div id="autocomplete-list" class="autocomplete-items"></div>
           </div>
           <button id="submit-btn" onclick="submitGuess()">Guess</button>
       </div>
       <div id="message" class="message"></div>
       <div class="legend">
           <h3>Legend:</h3>
           <div class="legend-items">
               <div class="legend-item">
                   <div class="legend-box correct"></div>
                   <span>Correct match</span>
               </div>
               <div class="legend-item">
                   <div class="legend-box incorrect"></div>
                   <span>Wrong</span>
               </div>
           </div>
       </div>
       <div class="bird-list-section">
           <button id="toggle-list-btn" onclick="toggleBirdList()">Show All Birds</button>
           <div id="bird-list" class="bird-list hidden"></div>
       </div>
       <div class="controls">
           <button onclick="showStats()"> Stats</button>
           <button onclick="showHelp()"> How to Play</button>
           <button onclick="showTypesGuide()"> Bird Types</button>
       </div>
   </div>
   <div id="modal" class="modal hidden">
       <div class="modal-content">
           <span class="close" onclick="closeModal()">&times;</span>
           <div id="modal-body"></div>
       </div>
   </div>
   <div id="win-popup" class="win-popup hidden">
    <div class="win-popup-content">
        <span class="close" onclick="closeWinPopup()">&times;</span>
        <div class="win-popup-inner">
            <p class="win-label"> You got it!</p>
            <h2 id="win-bird-name"></h2>
            <img id="win-bird-img" src="" alt="Bird photo" />
            <p id="win-guess-count"></p>
        </div>
    </div>
</div>
   <script src="bird-database.js"></script>
   <script src="bird-type-guide.js"></script>
   <script src="game.js"></script>
</body>
</html>
